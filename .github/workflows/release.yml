name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $$GITHUB_OUTPUT

      - name: Verify VERSION matches tag
        run: |
          FILE_VERSION=$$(cat VERSION)
          TAG_VERSION=$${{ steps.version.outputs.VERSION }}
          if [ "$$FILE_VERSION" != "$$TAG_VERSION" ]; then
            echo "VERSION ($$FILE_VERSION) does not match tag ($$TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $$TAG_VERSION"

      - name: Verify CHANGELOG has entry
        run: |
          grep -q "^## \[$${{ steps.version.outputs.VERSION }}\]" CHANGELOG.md || (echo "CHANGELOG missing entry"; exit 1)

      - name: Create release archive
        run: |
          mkdir -p dist
          VERSION=$${{ steps.version.outputs.VERSION }}
          tar --exclude='.git' --exclude='.github' -czf dist/argus-v$$VERSION.tar.gz .
          echo "Archive created: dist/argus-v$$VERSION.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/argus-v*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: $${{ secrets.GITHUB_TOKEN }}