name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, sys
          for f in ['ci.yml', 'review.yml']:
              with open(f'.github/workflows/{f}') as fp:
                  yaml.safe_load(fp)
              print(f'{f}: valid YAML')
          "
      - name: Check required files
        run: |
          for f in AGENTS.md SKILL.md README.md VERSION; do
            test -f "$f" && echo "$f ok" || (echo "$f missing"; exit 1)
          done