name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version in CHANGELOG
        run: |
          VERSION="$(cat VERSION)"
          grep -q "^## \[${VERSION}\]" CHANGELOG.md && echo "CHANGELOG entry found" || (echo "CHANGELOG missing [${VERSION}] section"; exit 1)

      - name: Check required files
        run: |
          for f in AGENTS.md SKILL.md README.md VERSION LICENSE; do
            test -f "$f" && echo "$f ok" || (echo "$f missing"; exit 1)
          done

      - name: Check SKILL.md trigger phrases
        run: |
          python3 -c "
          import re, sys
          f = open('SKILL.md').read()
          # count trigger-like phrases in description
          matches = re.findall(r'(?:when|trigger)[:\s]+([^"\n]+)', f, re.I)
          print(f'Found {len(matches)} trigger phrase groups')
          if len(matches) < 3:
            print('WARNING: SKILL.md should have 3+ trigger phrases')
          "

      - name: Check VERSION matches tag
        run: |
          VERSION="$(cat VERSION)"
          echo "v${VERSION}" > .version_check
          echo "Version: ${VERSION}"