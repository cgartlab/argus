<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    /* === Design Token Violations === */
    body {
      background: #ffffff;
      color: #333333;
      margin: 0;
      padding: 0;
    }

    .profile-card {
      background: oklch(0.97 0.01 120);
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      margin: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
    }

    .profile-card .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-card .info h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .profile-card .info p {
      font-size: 14px;
      color: #666666;
      line-height: 1.5;
    }

    .profile-card .stats {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .profile-card .stats .stat {
      text-align: center;
      padding: 8px 16px;
    }

    .profile-card .stats .stat .value {
      font-size: 20px;
      font-weight: bold;
      color: #1a73e8;
    }

    .profile-card .stats .stat .label {
      font-size: 12px;
      color: #999999;
    }

    .profile-card .action-btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      background: #1a73e8;
      color: #ffffff;
      font-size: 16px;
      border-radius: 6px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img class="avatar" src="avatar.jpg">
    <div class="info">
      <h2>John Doe</h2>
      <p>Full-stack developer with 10 years of experience building scalable web applications.</p>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="value">1,234</div>
        <div class="label">Followers</div>
      </div>
      <div class="stat">
        <div class="value">567</div>
        <div class="label">Following</div>
      </div>
      <div class="stat">
        <div class="value">89</div>
        <div class="label">Posts</div>
      </div>
    </div>
    <button class="action-btn">Follow</button>
  </div>
</body>
</html>
