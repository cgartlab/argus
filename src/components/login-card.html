<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #eee; font-family: Arial, sans-serif; }
    .login-card {
      background: #16213e; border-radius: 16px; padding: 32px;
      max-width: 400px; margin: 80px auto; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    h1 { font-size: 24px; margin-bottom: 24px; text-align: center; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 14px; color: #aaa; margin-bottom: 4px; }
    .input-group input {
      width: 100%; padding: 10px 12px; border: 1px solid #0f3460;
      border-radius: 8px; background: #0f3460; color: #fff; font-size: 16px;
    }
    .login-btn {
      width: 100%; padding: 12px; background: #e94560; color: #fff;
      border: none; border-radius: 8px; font-size: 16px; margin-top: 8px;
    }
    .link { text-align: center; margin-top: 16px; font-size: 14px; }
    .link a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Welcome Back</h1>
    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>
      <button class="login-btn">Sign In</button>
    </form>
    <div class="link">
      <a href="/forgot">Forgot password?</a>
    </div>
  </div>
</body>
</html>
