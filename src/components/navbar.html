<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f8f9fa; }
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      background: #212529; padding: 0 24px; height: 64px;
    }
    .logo { font-size: 20px; font-weight: bold; color: #ffffff; text-decoration: none; }
    .nav-links { display: flex; gap: 8px; list-style: none; }
    .nav-links a {
      color: #adb5bd; text-decoration: none; font-size: 14px; padding: 6px 12px;
      border-radius: 4px; transition: background 0.2s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.1); }
    .search-box {
      padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px;
      font-size: 14px; background: #ffffff; width: 200px;
    }
    .avatar { width: 32px; height: 32px; border-radius: 50%; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="logo" href="/">MyApp</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <input class="search-box" type="text" placeholder="Search...">
    <img class="avatar" src="user.jpg">
  </nav>
</body>
</html>
